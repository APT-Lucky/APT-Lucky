<svg width="640" height="295" viewBox="0 0 640 295" xmlns="http://www.w3.org/2000/svg">
  <!-- Window chrome -->
  <rect width="640" height="295" rx="10" fill="#161b22"/>
  <rect width="640" height="34" rx="10" fill="#21262d"/>
  <rect y="20" width="640" height="14" fill="#21262d"/>
  <!-- Traffic lights -->
  <circle cx="20" cy="17" r="6" fill="#ff5f57"/>
  <circle cx="40" cy="17" r="6" fill="#febc2e"/>
  <circle cx="60" cy="17" r="6" fill="#28c840"/>
  <!-- Title -->
  <text x="320" y="22" font-family="monospace" font-size="11" fill="#8b949e" text-anchor="middle" dominant-baseline="middle">bash — APT-Lucky</text>
  <!-- Terminal body -->
  <rect x="0" y="34" width="640" height="261" fill="#0d1117"/>
  <rect x="0" y="277" width="640" height="18" rx="10" fill="#0d1117"/>

  <!-- Content -->
  <text font-family="'Courier New',monospace" font-size="13">
    <tspan x="18" y="64" fill="#39ff14">$ whoami</tspan>
    <tspan x="18" dy="21" fill="#e6edf3">lucky</tspan>
    <tspan x="18" dy="26" fill="#39ff14">$ cat about.txt</tspan>
    <tspan x="18" dy="21" fill="#e6edf3">making Riftbound &#x2014; cartoon coop ARPG in UE5</tspan>
    <tspan x="18" dy="18" fill="#e6edf3">cheat dev | kernel drivers | AC research</tspan>
    <tspan x="18" dy="18" fill="#e6edf3">pentesting &amp; red team</tspan>
    <tspan x="18" dy="18" fill="#e6edf3">reversing binaries and malware</tspan>
    <tspan x="18" dy="18" fill="#e6edf3">mostly C++ and low-level stuff</tspan>
    <tspan x="18" dy="26" fill="#39ff14">$ ls tools/</tspan>
    <tspan x="18" dy="21" fill="#58a6ff">IDA_Pro  x64dbg  Ghidra  dnSpy  Burp  Metasploit  Kali</tspan>
    <tspan x="18" dy="26" fill="#39ff14">$ </tspan>
  </text>

  <!-- Blinking cursor -->
  <rect x="34" y="264" width="8" height="14" fill="#39ff14">
    <animate attributeName="opacity" values="1;1;0;0;1" dur="1.2s" repeatCount="indefinite"/>
  </rect>
</svg>
